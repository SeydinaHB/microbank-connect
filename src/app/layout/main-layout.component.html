<div class="h-screen flex bg-gray-100 overflow-hidden relative">

  <!-- Overlay sombre derrière la sidebar sur mobile, pour fermer au clic à côté -->
  @if (isSidebarOpen()) {
    <div
      (click)="closeSidebar()"
      class="fixed inset-0 bg-black/40 z-30 md:hidden"
    ></div>
  }

  <!-- Sidebar : fixe sur desktop, en tiroir (drawer) sur mobile -->
  <aside
    class="w-64 bg-slate-800 text-white flex flex-col flex-shrink-0 fixed md:static inset-y-0 left-0 z-40 transform transition-transform duration-200 md:translate-x-0"
    [class.translate-x-0]="isSidebarOpen()"
    [class.-translate-x-full]="!isSidebarOpen()"
  >
    <div class="p-5 border-b border-slate-700 flex items-center justify-between">
      <h1 class="text-lg font-bold">MicroBank Connect</h1>
      <button (click)="closeSidebar()" class="md:hidden text-white text-xl">✕</button>
    </div>

    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-slate-900"
          (click)="closeSidebar()"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-teal-700 transition"
        >
          <span>{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </aside>

  <!-- Contenu principal -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Navbar -->
    <header class="bg-gradient-to-r from-teal-600 via-teal-700 to-slate-800 shadow-sm px-4 md:px-6 py-4 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <!-- Bouton hamburger, visible uniquement sur mobile -->
        <button (click)="toggleSidebar()" class="md:hidden text-white text-xl flex-shrink-0">☰</button>
        <div class="min-w-0">
          <p class="text-sm text-teal-100 truncate">Connecté en tant que</p>
          <p class="font-semibold text-white truncate">
            {{ authService.currentUser()?.prenom }} {{ authService.currentUser()?.nom }}
            <span class="ml-2 text-xs bg-white/20 text-white px-2 py-0.5 rounded-full uppercase backdrop-blur-sm">
              {{ authService.userRole() }}
            </span>
          </p>
        </div>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0">
        <app-notification-bell />
        <button
          (click)="authService.logout()"
          class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-3 md:px-4 py-2 rounded-lg transition"
        >
          Déconnexion
        </button>
      </div>
    </header>

    <!-- Page active -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6">
      <router-outlet />
    </main>

  </div>
</div>
